<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>オフライン｜ポイッと</title>
    <style>
      :root {
        --coral: #e8542b;
        --ink: #2c2c2a;
        --bg: #faf8f5;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 24px;
        text-align: center;
        background: var(--bg);
        color: var(--ink);
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, system-ui,
          sans-serif;
      }
      img { width: 88px; height: auto; opacity: 0.9; }
      h1 { font-size: 18px; margin: 8px 0 0; }
      p { font-size: 14px; color: rgba(44, 44, 42, 0.6); margin: 0; max-width: 22rem; }
      button {
        margin-top: 8px;
        border: 0;
        border-radius: 999px;
        background: var(--coral);
        color: #fff;
        font-weight: 700;
        font-size: 14px;
        padding: 10px 22px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <img src="/brand/mark/poitto_mark_256.png" alt="ポイッと" />
    <h1>オフラインです</h1>
    <p>インターネットに接続できませんでした。接続を確認して、もう一度お試しください。</p>
    <button onclick="location.reload()">再読み込み</button>
  </body>
</html>
